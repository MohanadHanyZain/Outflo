<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Lead Gen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">استخراج العملاء من LinkedIn</h1>

    <!-- Inputs -->
    <div class="flex flex-col gap-4 mb-6">
      <input type="text" id="jobTitle" placeholder="Job Title" class="p-3 border rounded-lg">
      <input type="text" id="location" placeholder="Location" class="p-3 border rounded-lg">
      <input type="text" id="industry" placeholder="Industry" class="p-3 border rounded-lg">
      <button id="searchBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Search & Enrich</button>
    </div>

    <!-- Status -->
    <div id="statusMessage" class="mb-4 text-sm font-medium">الانتظار لبدء العملية...</div>

    <!-- Results Table -->
    <div class="overflow-x-auto border rounded-lg max-h-[400px] overflow-y-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50 sticky top-0">
          <tr>
            <th class="px-4 py-3 font-medium text-gray-600">Name</th>
            <th class="px-4 py-3 font-medium text-gray-600">Title</th>
            <th class="px-4 py-3 font-medium text-gray-600">Company</th>
            <th class="px-4 py-3 font-medium text-gray-600">Email</th>
            <th class="px-4 py-3 font-medium text-gray-600">LinkedIn Profile</th>
          </tr>
        </thead>
        <tbody id="linkedinTableBody" class="divide-y divide-gray-200 bg-white">
          <tr>
            <td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">لا توجد بيانات حالياً.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="linkedin.js"></script>
</body>
</html>
