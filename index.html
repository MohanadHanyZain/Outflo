<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة استخراج العملاء - مهند</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">أداة استخراج العملاء المحتملين</h1>

        <div class="flex gap-4 mb-6">
            <input type="text" id="searchInput" placeholder="مثال: شركات تسويق في الرياض" 
                   class="flex-grow p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="startBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">بدء البحث</button>
            <button id="enrichBtn" disabled class="bg-purple-600 text-white px-6 py-2 rounded-lg disabled:opacity-50 hover:bg-purple-700">استخراج الإيميلات</button>
        </div>

        <div id="statusMessage" class="mb-4 text-sm font-medium">الانتظار لبدء العملية...</div>

        <div class="overflow-x-auto border rounded-lg max-h-[400px] overflow-y-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50 sticky top-0">
    <tr>
        <th class="px-4 py-3">Place name</th>
        <th class="px-4 py-3">Total Score</th>
        <th class="px-4 py-3">Reviews Count</th>
        <th class="px-4 py-3">Street</th>
        <th class="px-4 py-3">City</th>
        <th class="px-4 py-3">State</th>
        <th class="px-4 py-3">Country Code</th>
        <th class="px-4 py-3">Website</th>
        <th class="px-4 py-3">Phone</th>
        <th class="px-4 py-3">Categories</th>
        <th class="px-4 py-3">Category Name</th>
    </tr>
</thead>


                <tbody id="resultsTableBody" class="divide-y divide-gray-200 bg-white">
                    <tr>
                        <td colspan="4" class="px-4 py-8 text-center text-gray-400 italic">لا توجد بيانات حالياً.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
