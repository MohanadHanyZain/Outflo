<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outflo — Login</title>

    <!-- Google Font (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0B0F19;
            color: #E5E7EB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: #1A202C;
            border: 1px solid #2D3748;
            border-radius: 16px;
            padding: 40px 36px;
            transition: border-color 0.2s ease;
        }
        .auth-card:hover {
            border-color: #4F46E5;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-brand h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #818CF8, #6366F1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-brand p {
            color: #6B7280;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        .form-group .form-control {
            width: 100%;
            background: #111827;
            border: 1px solid #2D3748;
            border-radius: 8px;
            color: #E5E7EB;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        .form-group .form-control:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            outline: none;
        }
        .form-group .form-control::placeholder {
            color: #6B7280;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #6366F1;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        .btn-auth:hover {
            background: #4F46E5;
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-auth.signup-btn {
            background: #0A66C2;
        }
        .btn-auth.signup-btn:hover {
            background: #004182;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: #6B7280;
            font-size: 0.8rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2D3748;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #6B7280;
        }
        .auth-footer .toggle-link {
            color: #818CF8;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .auth-footer .toggle-link:hover {
            color: #6366F1;
        }

        .error-message {
            background: #3B1F2E;
            color: #F472B6;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #5C2A3A;
        }
        .error-message.show {
            display: block;
        }

        .success-message {
            background: #064E3B;
            color: #34D399;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #0A6B4A;
        }
        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6B7280;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }
        .password-wrapper .toggle-password:hover {
            color: #9CA3AF;
        }

        /* ===== Signup fields (hidden by default) ===== */
        .signup-fields {
            display: none;
        }
        .signup-fields.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .password-strength {
            font-size: 0.75rem;
            margin-top: 6px;
            color: #6B7280;
        }
        .password-strength .weak { color: #F472B6; }
        .password-strength .medium { color: #FBBF24; }
        .password-strength .strong { color: #34D399; }

        .terms-text {
            font-size: 0.75rem;
            color: #6B7280;
            text-align: center;
            margin-top: 12px;
            line-height: 1.6;
        }
        .terms-text a {
            color: #818CF8;
            text-decoration: none;
        }
        .terms-text a:hover {
            color: #6366F1;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-brand">
                <h1>Outflo</h1>
                <p id="brandSubtitle">B2B Intelligence Platform</p>
            </div>

            <!-- Error / Success Messages -->
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Auth Form -->
            <form id="authForm" autocomplete="off">
                <!-- ===== SIGNUP FIELDS (hidden by default) ===== -->
                <div class="signup-fields" id="signupFields">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" />
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="6" />
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>

                <!-- ===== CONFIRM PASSWORD (hidden by default) ===== -->
                <div class="signup-fields" id="signupFields2">
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" />
                            <button type="button" class="toggle-password" id="toggleConfirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="terms-text">
                        By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="submitBtn">
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <div class="auth-divider">or</div>

            <div class="auth-footer">
                <span id="toggleText">Don't have an account?</span>
                <span class="toggle-link" id="toggleLink">Create Account</span>
            </div>

        </div>
    </div>

    <script>
        // =============================================
        // Supabase Configuration
        // =============================================
        const SUPABASE_URL = 'https://smhkccanevtpdiuemseb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtaGtjY2FuZXZ0cGRpdWVtc2ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDg0NTQsImV4cCI6MjA5OTA4NDQ1NH0.KzynIoWK_MYc59Syk1b3KKGdhDab2cJKAWLRT6uId30';

        // Create Supabase client with a unique name to avoid conflicts
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =============================================
        // DOM Elements
        // =============================================
        const form = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const fullNameInput = document.getElementById('fullName');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const toggleLink = document.getElementById('toggleLink');
        const toggleText = document.getElementById('toggleText');
        const brandSubtitle = document.getElementById('brandSubtitle');
        const passwordStrength = document.getElementById('passwordStrength');
        const signupFields = document.getElementById('signupFields');
        const signupFields2 = document.getElementById('signupFields2');

        // =============================================
        // Check if user is already logged in
        // =============================================
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();

        // =============================================
        // Toggle Password Visibility
        // =============================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const icon = this.querySelector('i');
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                confirmPasswordInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // =============================================
        // Password Strength Checker
        // =============================================
        passwordInput.addEventListener('input', function() {
            const val = this.value;
            let strength = '';
            let className = '';

            if (val.length === 0) {
                passwordStrength.textContent = '';
                return;
            }

            if (val.length < 6) {
                strength = 'Weak - minimum 6 characters';
                className = 'weak';
            } else if (val.length < 10) {
                strength = 'Medium';
                className = 'medium';
            } else {
                strength = 'Strong';
                className = 'strong';
            }

            passwordStrength.innerHTML = 'Strength: <span class="' + className + '">' + strength + '</span>';
        });

        // =============================================
        // ===== SIMPLE TOGGLE FUNCTION =====
        // =============================================
        let isLoginMode = true;

        function toggleMode() {
            if (isLoginMode) {
                // Switch to SIGNUP mode
                isLoginMode = false;
                
                // Update UI
                toggleLink.textContent = 'Sign In';
                toggleText.textContent = "Already have an account?";
                btnText.textContent = 'Create Account';
                brandSubtitle.textContent = 'Start your free trial';
                submitBtn.className = 'btn-auth signup-btn';
                
                // Show signup fields
                signupFields.classList.add('active');
                signupFields2.classList.add('active');
                
                // Make fields required
                fullNameInput.setAttribute('required', '');
                confirmPasswordInput.setAttribute('required', '');
                
                // Clear messages
                errorMsg.classList.remove('show');
                successMsg.classList.remove('show');
                
                console.log('✅ Switched to SIGNUP mode');
                
            } else {
                // Switch to LOGIN mode
                isLoginMode = true;
                
                // Update UI
                toggleLink.textContent = 'Create Account';
                toggleText.textContent = "Don't have an account?";
                btnText.textContent = 'Sign In';
                brandSubtitle.textContent = 'B2B Intelligence Platform';
                submitBtn.className = 'btn-auth';
                
                // Hide signup fields
                signupFields.classList.remove('active');
                signupFields2.classList.remove('active');
                
                // Remove required
                fullNameInput.removeAttribute('required');
                confirmPasswordInput.removeAttribute('required');
                
                // Clear confirm password
                confirmPasswordInput.value = '';
                
                // Clear messages
                errorMsg.classList.remove('show');
                successMsg.classList.remove('show');
                
                console.log('✅ Switched to LOGIN mode');
            }
        }

        // =============================================
        // Add click event to toggle link
        // =============================================
        toggleLink.addEventListener('click', toggleMode);

        // =============================================
        // Show/Hide Messages
        // =============================================
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            successMsg.classList.remove('show');
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.classList.add('show');
            errorMsg.classList.remove('show');
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.innerHTML = '<span class="loading-spinner"></span> Processing...';
            } else {
                btnText.textContent = isLoginMode ? 'Sign In' : 'Create Account';
            }
        }

        // =============================================
        // Handle Form Submit
        // =============================================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Clear previous messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please fill in all required fields.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            // Check signup fields
            if (!isLoginMode) {
                const fullName = fullNameInput.value.trim();
                const confirmPassword = confirmPasswordInput.value;

                if (!fullName) {
                    showError('Please enter your full name.');
                    fullNameInput.focus();
                    return;
                }

                if (password !== confirmPassword) {
                    showError('Passwords do not match.');
                    confirmPasswordInput.focus();
                    return;
                }
            }

            setLoading(true);

            try {
                if (isLoginMode) {
                    // ===== LOGIN =====
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) {
                        if (error.message.includes('Invalid login credentials')) {
                            showError('Invalid email or password. Please try again.');
                        } else if (error.message.includes('Email not confirmed')) {
                            showError('Please confirm your email before signing in.');
                        } else {
                            showError(error.message);
                        }
                        setLoading(false);
                        return;
                    }

                    if (data.session) {
                        showSuccess('Welcome back! Redirecting...');
                        setTimeout(function() {
                            window.location.href = 'index.html';
                        }, 1000);
                    }

                } else {
                    // ===== SIGNUP =====
                    const fullName = fullNameInput.value.trim();

                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName
                            }
                        }
                    });

                    if (error) {
                        if (error.message.includes('User already registered')) {
                            showError('This email is already registered. Please sign in instead.');
                            setTimeout(function() {
                                if (!isLoginMode) {
                                    toggleMode();
                                }
                            }, 2000);
                        } else {
                            showError(error.message);
                        }
                        setLoading(false);
                        return;
                    }

                    if (data.user) {
                        if (data.user.identities && data.user.identities.length === 0) {
                            showError('This email is already registered. Please sign in instead.');
                            setTimeout(function() {
                                if (!isLoginMode) {
                                    toggleMode();
                                }
                            }, 2000);
                            setLoading(false);
                            return;
                        }

                        showSuccess('Account created successfully! Please check your email to confirm your account.');
                        setLoading(false);

                        // Auto switch to login after 3 seconds
                        setTimeout(function() {
                            if (!isLoginMode) {
                                toggleMode();
                            }
                            emailInput.value = email;
                            passwordInput.value = '';
                            confirmPasswordInput.value = '';
                            showSuccess('Account created! Please sign in with your credentials.');
                        }, 3000);
                        return;
                    }
                }

            } catch (err) {
                showError('An unexpected error occurred. Please try again.');
                console.error('Auth error:', err);
            }

            setLoading(false);
        });

        // =============================================
        // Auto-login after email confirmation
        // =============================================
        async function handleEmailConfirmation() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                const params = new URLSearchParams(hash.substring(1));
                const accessToken = params.get('access_token');
                if (accessToken) {
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: params.get('refresh_token') || ''
                    });
                    if (!error && data.session) {
                        window.location.href = 'index.html';
                    }
                }
            }
        }
        handleEmailConfirmation();

        // =============================================
        // Enter key to submit
        // =============================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // =============================================
        // Init - Start in login mode
        // =============================================
        console.log('🔐 Login page ready');
        console.log('📧 Supabase connected to:', SUPABASE_URL);
        console.log('💡 Click "Create Account" to switch to signup mode');
    </script>

</body>
</html>
