<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outflo — Google Maps</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Google Font (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="d-flex align-items-center gap-3">
            <button class="toggle-sidebar" id="sidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="brand">
                <span>Outflo</span>
            </div>
        </div>
        <div class="header-actions">
            <span class="badge-status"><i class="fas fa-circle" style="font-size: 0.4rem; vertical-align: middle; margin-right: 4px;"></i> Live</span>

            <span class="badge-status" id="userDisplay" style="background: #1E3A5F; color: #60A5FA;">
        <i class="fas fa-user me-1"></i> user@email.com
    </span>
    <button class="btn btn-outline-custom btn-sm" id="logoutBtn" style="padding: 4px 12px; font-size: 0.75rem;">
        <i class="fas fa-sign-out-alt me-1"></i> Logout
    </button>
        </div>
    </header>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="mainSidebar">
        <nav class="nav flex-column">
            <div class="nav-section">Platform</div>
            <a href="index.html" class="nav-link">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="gmaps.html" class="nav-link active">
                <i class="fas fa-map-pin"></i> Google Maps
            </a>
            <a href="linkedin.html" class="nav-link">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
        </nav>
        <div class="mt-auto pt-3 border-top border-secondary border-opacity-25" style="margin-top: 40px;">
            <div class="text-secondary small" style="padding: 0 16px;">
                <i class="fas fa-shield-alt me-1"></i> Secured
            </div>
            <div class="text-secondary small" style="padding: 0 16px; margin-top: 4px;">
                <i class="fas fa-circle text-success me-1" style="font-size: 0.4rem;"></i> v2.0
            </div>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="mainContent">

        <h1 class="h4 fw-bold text-light mb-4">
            <i class="fas fa-map-pin text-danger me-2"></i>Google Maps Scraper
        </h1>

        <!-- Controls -->
        <div class="glass-card mb-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold text-light small text-uppercase">Keyword</label>
                    <input type="text" class="form-control form-control-custom" id="googleKeyword" value="restaurant" placeholder="e.g. restaurant, clinic" />
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold text-light small text-uppercase">Location</label>
                    <input type="text" class="form-control form-control-custom" id="googleLocation" value="Dubai, UAE" placeholder="e.g. Riyadh, KSA" />
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold text-light small text-uppercase">Target Count</label>
                    <input type="number" class="form-control form-control-custom" id="leadCount" value="20" min="10" max="100" />
                </div>
            </div>
            <div class="mt-3 d-flex justify-content-between align-items-center">
                <span class="text-secondary small"><i class="fas fa-robot me-1"></i> Actor: AabCualFIriz3X6Fs</span>
                <button class="btn btn-primary-custom" id="runGoogleBtn">
                    <i class="fas fa-play me-2"></i> Run Google Scraper
                </button>
            </div>
        </div>

        <!-- Status -->
        <div class="glass-card p-3 mb-4">
            <div class="row align-items-center g-3">
                <div class="col-md-6">
                    <div class="d-flex align-items-center gap-3">
                        <div class="status-pulse" id="statusPulse"></div>
                        <div>
                            <div id="statusMessage" class="fw-semibold text-light" style="font-size:0.95rem;">
                                <i class="fas fa-circle-notch fa-spin me-2"></i> Awaiting action
                            </div>
                            <div class="text-secondary small" id="resultCount">0 leads</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="d-flex align-items-center gap-3 justify-content-md-end">
                        <div class="progress-custom w-100" style="max-width:200px;">
                            <div id="progressBar" class="progress-bar" style="width:0%;"></div>
                        </div>
                        <button class="btn btn-outline-custom btn-sm" id="downloadCsvBtn" disabled>
                            <i class="fas fa-file-csv me-1"></i> CSV
                        </button>
                        <button class="btn btn-outline-custom btn-sm" id="debugBtn">
                            <i class="fas fa-bug"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="glass-card p-0 overflow-hidden">
            <div class="p-3 border-bottom border-secondary border-opacity-25 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold text-light mb-0"><i class="fas fa-table me-2 text-primary"></i>Extracted Leads</h5>
                <span class="badge bg-primary bg-opacity-10 text-primary small"><i class="fas fa-filter me-1"></i> Smart Filter</span>
            </div>
            <div class="table-wrap">
                <table class="table table-custom mb-0" id="resultsTable">
                    <thead id="dynamicHead">
                        <!-- built by JS -->
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="text-center text-secondary py-4">No leads yet. Run a scraper above.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-3 text-secondary small text-center opacity-50">
            <i class="fas fa-lock me-1"></i> Secured · Outflo v2.0 · B2B Intelligence
        </div>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core Logic -->
    <script src="app.js"></script>
    <!-- Google Maps Specific -->
    <script src="gmaps.js"></script>

    <script src="auth-check.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
        // ===== Initialize Auth =====
        Auth.initAuth().then(userData => {
            if (!userData) return;
            console.log('✅ Authenticated:', userData.user.email);
        });

        // ===== Sidebar toggle =====
        const toggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('mainSidebar');
        const main = document.getElementById('mainContent');
        if (toggle && sidebar && main) {
            toggle.addEventListener('click', function() {
                if (window.innerWidth <= 992) {
                    sidebar.classList.toggle('open');
                } else {
                    sidebar.classList.toggle('collapsed');
                    main.classList.toggle('expanded');
                }
            });
            window.addEventListener('resize', function() {
                if (window.innerWidth <= 992) {
                    sidebar.classList.remove('collapsed');
                    main.classList.remove('expanded');
                } else {
                    sidebar.classList.remove('open');
                }
            });
        }
    });
        
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('mainSidebar');
            const main = document.getElementById('mainContent');
            if (toggle && sidebar && main) {
                toggle.addEventListener('click', function() {
                    if (window.innerWidth <= 992) {
                        sidebar.classList.toggle('open');
                    } else {
                        sidebar.classList.toggle('collapsed');
                        main.classList.toggle('expanded');
                    }
                });
                window.addEventListener('resize', function() {
                    if (window.innerWidth <= 992) {
                        sidebar.classList.remove('collapsed');
                        main.classList.remove('expanded');
                    } else {
                        sidebar.classList.remove('open');
                    }
                });
            }
        });
    </script>
</body>
</html>
