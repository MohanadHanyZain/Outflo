<!DOCTYPE html>
<html>
<head><title>Test Apify LinkedIn</title></head>
<body>
<button onclick="testApify()">اختبر Apify الآن</button>
<pre id="result"></pre>

<script>
async function testApify() {
    const TOKEN = "apify_api_J3P2YlygNudvv6ZSWNJ8cbLrPrFhxe3p4zIz";
    const resultEl = document.getElementById('result');
    
    resultEl.textContent = "جاري الاختبار...";
    
    // الاختبار الأول: ممثل Google Search للبحث عن LinkedIn
    const input1 = {
        "query": 'site:linkedin.com/in/ "Marketing Manager" "Egypt"',
        "maxPages": 1,
        "proxyConfiguration": {
            "useApifyProxy": true,
            "apifyProxyGroups": ["GOOGLE_SERP"]
        }
    };
    
    try {
        // تشغيل الممثل
        const runRes = await fetch(`https://api.apify.com/v2/acts/Wp9rLb1xk0Z6e3JX9/runs?token=${TOKEN}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(input1)
        });
        const runData = await runRes.json();
        const runId = runData.data.id;
        const datasetId = runData.data.defaultDatasetId;
        
        resultEl.textContent = `Run ID: ${runId}\nDataset ID: ${datasetId}\nفي انتظار النتائج...`;
        
        // انتظار 15 ثانية
        await new Promise(r => setTimeout(r, 15000));
        
        // جلب النتائج
        const itemsRes = await fetch(`https://api.apify.com/v2/datasets/${datasetId}/items?token=${TOKEN}`);
        const items = await itemsRes.json();
        
        resultEl.textContent = `✅ تم العثور على ${items.length} نتيجة\n\nالنتائج:\n${JSON.stringify(items.slice(0, 3), null, 2)}`;
        
    } catch(e) {
        resultEl.textContent = `❌ خطأ: ${e.message}`;
    }
}
</script>
</body>
</html>
